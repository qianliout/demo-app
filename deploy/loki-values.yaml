deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
    filesystem:
      chunks_directory: /var/loki/chunks
      rules_directory: /var/loki/rules
    bucketNames:
      chunks: chunks
      ruler: ruler
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 5Gi

# 节点 VM 网络不通 Docker Hub，走本地镜像
global:
  image:
    pullPolicy: IfNotPresent

backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
minio:
  enabled: false
